<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - StudyFlow</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1 class="auth-brand">StudyFlow</h1>
    <p class="auth-subtitle">管理你的学习节奏</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">用户名</label>
        <input class="input" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">密码</label>
        <input class="input" id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="button primary full" type="submit">登录</button>
      <div class="form-error" data-auth-error></div>
    </form>
    <p class="auth-switch">还没有账号? <a href="register.html">注册</a></p>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
