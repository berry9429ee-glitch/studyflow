server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: studyflow
  profiles:
    default: dev
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Shanghai
  messages:
    basename: messages
    encoding: UTF-8
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.studyflow.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  setting:
    language: zh_cn

jwt:
  expiration: ${JWT_EXPIRATION:604800000}

studyflow:
  reminder:
    enabled: ${STUDYFLOW_REMINDER_ENABLED:true}
    due-soon-days: ${STUDYFLOW_REMINDER_DUE_SOON_DAYS:2}
    scan-cron: "${STUDYFLOW_REMINDER_SCAN_CRON:0 0 8 * * *}"
    zone: "${STUDYFLOW_REMINDER_ZONE:Asia/Shanghai}"
