name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            echo "Checking ${file}"
            if grep -Eq '^[[:space:]]*(import|export)[[:space:]]' "${file}"; then
              node --input-type=module --check < "${file}"
            else
              node --check "${file}"
            fi
          done < <(find src/main/resources/static/js -name '*.js' -print0)

      - name: Run frontend demo tests
        run: npm test
